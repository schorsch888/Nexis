# cargo-audit 配置
# https://docs.rs/cargo-audit

[advisories]
# 忽略不影响我们的漏洞和警告
ignore = [
    # rsa timing attack - only affects sqlx-mysql, we use postgres only
    "RUSTSEC-2023-0071",
    # unmaintained crates (indirect dependencies)
    "RUSTSEC-2024-0436",  # paste - via tokenizers
    "RUSTSEC-2025-0119",  # number_prefix - via tokenizers
    "RUSTSEC-2025-0134",  # rustls-pemfile - via qdrant-client
]
