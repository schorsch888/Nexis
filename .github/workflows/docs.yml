name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install mdBook
        run: cargo install mdbook --locked --version 0.4.43

      - name: Build Rust API documentation
        run: |
          cargo doc --workspace --no-deps --document-private-items

      - name: Build mdBook site
        run: mdbook build docs-src

      - name: Merge site artifacts
        run: |
          rm -rf target/site
          mkdir -p target/site/api/rust
          cp -r docs-src/book/* target/site/
          cp -r target/doc/* target/site/api/rust/
          touch target/site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/site

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
